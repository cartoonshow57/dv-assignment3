<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
      background: #ffffff;
    }
    #vis {
      width: 90%;
      max-width: 1200px;
    }
    h2 {
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Vega-Lite Assignment 3 - Sales Data Visualization</h2>
  <p style="margin-top: 5px; font-size: 16px; color: #555;">
    Lakshya 2024EET2356
  </p>
  <div id="vis"></div>

  <script type="text/javascript">
    const spec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "data": {
        "url": "HW_III.csv",
        "format": {
          "parse": {
            "OrderDate": "date",
            "Units": "number",
            "Total": "number",
            "Unit Cost": "number"
          }
        }
      },
      "title": "Multiview: Office Supply Sales Dashboard",
      "concat": [
        {
          "title": "1. Donut Chart: Total by Rep",
          "mark": {
            "type": "arc",
            "innerRadius": 50,
            "tooltip": true
          },
          "encoding": {
            "theta": {
              "field": "Total",
              "type": "quantitative",
              "aggregate": "sum"
            },
            "color": {
              "field": "Rep",
              "type": "nominal",
              "legend": {
                "title": "Rep"
              }
            }
          }
        },
        {
          "title": "2. Streamgraph: Total Over Time by Item",
          "width": 500,
          "mark": {
            "type": "area"
          },
          "encoding": {
            "x": {
              "timeUnit": "yearmonth",
              "field": "OrderDate",
              "type": "temporal",
              "axis": {
                "domain": false,
                "format": "%b %Y",
                "title": "Order Date"
              }
            },
            "y": {
              "aggregate": "sum",
              "field": "Total",
              "type": "quantitative",
              "stack": "center",
              "axis": null
            },
            "color": {
              "field": "Item",
              "type": "nominal",
              "legend": {
                "title": "Item"
              }
            }
          }
        },
        {
          "title": "3. Trellis Histogram: Units for Items with Mean Overlay",
          "facet": {
            "field": "Item",
            "type": "nominal"
          },
          "columns": 5,
          "spec": {
            "width": 130,
            "height": 140,
            "layer": [
              {
                "mark": {
                  "type": "bar",
                  "tooltip": true
                },
                "encoding": {
                  "x": {
                    "bin": true,
                    "field": "Units",
                    "type": "quantitative",
                    "title": "Units"
                  },
                  "y": {
                    "aggregate": "count",
                    "type": "quantitative",
                    "title": "Count"
                  }
                }
              },
              {
                "mark": {
                  "type": "rule",
                  "color": "red",
                  "size": 2
                },
                "encoding": {
                  "x": {
                    "aggregate": "mean",
                    "field": "Units",
                    "type": "quantitative"
                  }
                }
              }
            ]
          }
        },
        {
          "title": "4. Interactive Scatter: Units vs Total (brush to highlight)",
          "width": 350,
          "height": 280,
          "params": [
            {
              "name": "brush",
              "select": {
                "type": "interval"
              }
            }
          ],
          "mark": {
            "type": "point",
            "filled": true,
            "tooltip": true
          },
          "encoding": {
            "x": {
              "field": "Units",
              "type": "quantitative",
              "title": "Units"
            },
            "y": {
              "field": "Total",
              "type": "quantitative",
              "title": "Total ($)"
            },
            "color": {
              "condition": {
                "param": "brush",
                "field": "Region",
                "type": "nominal"
              },
              "value": "lightgray"
            },
            "size": {
              "condition": {
                "param": "brush",
                "value": 80
              },
              "value": 30
            }
          }
        },
        {
          "title": "5. Sales by Rep per Region (click legend to highlight)",
          "width": 350,
          "height": 280,
          "params": [
            {
              "name": "regionSelect",
              "select": {
                "type": "point",
                "fields": ["Region"]
              },
              "bind": "legend"
            }
          ],
          "mark": {
            "type": "bar",
            "tooltip": true
          },
          "encoding": {
            "x": {
              "field": "Rep",
              "type": "nominal",
              "title": "Sales Rep",
              "sort": "-y"
            },
            "y": {
              "aggregate": "sum",
              "field": "Total",
              "type": "quantitative",
              "title": "Sum of Total ($)"
            },
            "color": {
              "field": "Region",
              "type": "nominal"
            },
            "opacity": {
              "condition": {
                "param": "regionSelect",
                "value": 1
              },
              "value": 0.2
            }
          }
        }
      ],
      "columns": 2,
      "resolve": {
        "scale": {
          "color": "independent"
        }
      }
    };

    vegaEmbed('#vis', spec);
  </script>
</body>
</html>
